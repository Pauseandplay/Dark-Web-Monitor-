<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "DarkWatch AI" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <div class="logo">DW</div>
            <div>
                <h2>DarkWatch AI</h2>
                <p>Threat Intel Monitor</p>
            </div>
        </div>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/breach">Breach Monitor</a>
            <a href="/threats">Threat Feeds</a>
            <a href="/ioc">IOC Lookup</a>
        </nav>
        <div class="safe-note">Legal OSINT only · No illegal dark-web scraping</div>
    </aside>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
